name: repo-db-indexer

on:
  push:
    branches:
      - try-repo-db-indexer
      - main
    paths:
      - 'posts/**'
      - 'structures/**'
      - '.github/workflows/repo-db-indexer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: abhinrustagi/repo-db-indexer@v0.1.0
        with:
          config: |
            name: blog
            types:
              post:
                content: posts/**/*.md
                format: markdown-frontmatter
                schema: structures/post.schema.json
                projection: structures/post.index.json
                key: slug
                sort:
                  field: date
                  order: desc
            llms: false
            update_readme: false
            rules:
              unknown-fields: warn
              projection-missing: warn
          commit: 'true'
